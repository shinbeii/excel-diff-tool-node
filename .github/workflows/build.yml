name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # cho phép chạy thủ công từ tab Actions

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            build_cmd: npm run build:win
            artifact_glob: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest*.yml
          - os: macos-14   # Apple Silicon runner
            name: macos-arm64
            build_cmd: npm run build:mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest*.yml

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --include=optional
        env:
          # Cho phép sharp tải đúng prebuilt cho từng OS/arch của runner
          npm_config_build_from_source: false

      - name: Run tests
        run: npm test

      - name: Build app (${{ matrix.name }})
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bỏ qua code-sign (chưa có Developer ID)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExcelDiffTool-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
